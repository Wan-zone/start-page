<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="storeMetaDescription" name="description" content="" />
    <title id="storeDocumentTitle"></title>
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="store-page">
      <header class="store-header glass-panel">
        <div>
          <p id="storeHeaderEyebrow" class="eyebrow"></p>
          <h1 id="storeHeaderTitle"></h1>
          <p id="storeHeaderCopy" class="store-copy"></p>
        </div>
        <div class="store-actions">
          <a id="storeBackHomeLink" class="store-link" href="../index.html"></a>
        </div>
      </header>

      <section class="store-layout">
        <aside class="store-sidebar glass-panel">
          <div class="section-heading">
            <div>
              <p id="storeShelfEyebrow" class="eyebrow"></p>
              <h2 id="storeShelfTitle"></h2>
            </div>
            <button id="shuffleStoriesButton" class="store-link store-link-button" type="button"></button>
          </div>
          <div id="storyList" class="story-list"></div>
        </aside>

        <article class="store-reader glass-panel">
          <div class="section-heading">
            <div>
              <p id="storeReaderEyebrow" class="eyebrow"></p>
              <h2 id="storyTitle"></h2>
            </div>
          </div>
          <p id="storySummary" class="story-summary"></p>
          <div id="storyContent" class="story-content"></div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="小故事页 for Wan Start Page." />
    <title>小故事 | Wan Start Page</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="store-page">
      <header class="store-header glass-panel">
        <div>
          <p class="eyebrow">STORE</p>
          <h1>小故事</h1>
          <p class="store-copy">这里统一承接首页的小故事入口。后面你只需要改 `store/data/stories.json`，页面会自动更新故事列表、摘要和正文。</p>
        </div>
        <div class="store-actions">
          <a class="store-link" href="../index.html">返回主页</a>
          <a class="store-link" href="../games/index.html">返回游戏页</a>
        </div>
      </header>

      <section class="store-layout">
        <aside class="store-sidebar glass-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">SHELF</p>
              <h2>故事列表</h2>
            </div>
          </div>
          <div id="storyList" class="story-list"></div>
        </aside>

        <article class="store-reader glass-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">READER</p>
              <h2 id="storyTitle">加载中</h2>
            </div>
          </div>
          <p id="storySummary" class="story-summary">正在读取故事摘要。</p>
          <div id="storyContent" class="story-content"></div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>

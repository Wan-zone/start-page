<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="pageDescriptionMeta" name="description" content="" />
    <title id="pageTitleNode"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
    <link rel="stylesheet" href="./text-shooter.css" />
  </head>
  <body>
    <div class="club-bg-layer club-bg-layer-a" aria-hidden="true"></div>
    <div class="club-bg-layer club-bg-layer-b" aria-hidden="true"></div>
    <div class="club-strobe-layer" aria-hidden="true"></div>
    <div class="club-beam-layer club-beam-layer-a" aria-hidden="true"></div>
    <div class="finish-flash-layer" id="finishFlashLayer" aria-hidden="true"></div>
    <div class="climax-jet-layer" id="climaxJetLayer" aria-hidden="true">
      <div class="climax-jet-core"></div>
      <div class="climax-jet-mist"></div>
      <div class="climax-jet-splash climax-jet-splash-left"></div>
      <div class="climax-jet-splash climax-jet-splash-right"></div>
    </div>
    <div class="finish-modal" id="finishModal" aria-hidden="true">
      <div class="finish-modal-card panel" role="dialog" aria-modal="true" aria-labelledby="finishModalTitle">
        <span id="finishModalEyebrow" class="mini-label"></span>
        <span id="finishModalBadge" class="finish-modal-badge" hidden></span>
        <h2 id="finishModalTitle"></h2>
        <p id="finishModalText" class="finish-modal-text"></p>
        <div class="finish-modal-actions">
          <button id="finishModalRestart" class="pill-button" type="button"></button>
          <a id="finishModalBackLink" class="back-link" href="./index.html"></a>
        </div>
      </div>
    </div>
    <main class="text-game-page">
      <header class="page-header panel">
        <div>
          <p id="pageEyebrow" class="eyebrow"></p>
          <h1 id="pageHeading"></h1>
          <p id="pageCopy" class="page-copy"></p>
        </div>
        <div class="header-actions">
          <div class="header-links">
            <a id="backToGamesLink" class="back-link" href="./index.html"></a>
            <a id="backToHomeLink" class="back-link" href="../index.html"></a>
          </div>
          <div class="record-box" aria-label="个人快感纪录">
            <span id="recordLabel" class="status-label"></span>
            <strong id="recordValue">0</strong>
          </div>
        </div>
      </header>
      <section class="text-game-grid">
        <article class="panel status-panel">
          <div class="section-heading">
            <div>
              <p id="statusEyebrow" class="eyebrow"></p>
              <h2 id="statusHeading"></h2>
            </div>
            <button id="textShooterRestart" class="pill-button" type="button"></button>
          </div>
          <div class="status-grid">
            <div class="status-cell">
              <span id="turnLabel" class="status-label"></span>
              <strong id="turnValue">1</strong>
            </div>
            <div class="status-cell">
              <span id="arousalLabel" class="status-label"></span>
              <strong id="hpValue">0</strong>
            </div>
            <div class="status-cell">
              <span id="enduranceLabel" class="status-label"></span>
              <strong id="shieldValue">100</strong>
            </div>
            <div class="status-cell">
              <span id="techniqueLabel" class="status-label"></span>
              <strong id="ammoValue">2</strong>
            </div>
            <div class="status-cell">
              <span id="waveLabel" class="status-label"></span>
              <strong id="waveValue">1</strong>
            </div>
            <div class="status-cell">
              <span id="scoreLabel" class="status-label"></span>
              <strong id="scoreValue">0</strong>
            </div>
          </div>
          <div class="objective-card">
            <span id="objectiveEyebrow" class="mini-label"></span>
            <strong id="objectiveTitle"></strong>
            <p id="objectiveMeta"></p>
          </div>
        </article>
        <article class="panel battle-panel">
          <div class="section-heading">
            <div>
              <p id="battleEyebrow" class="eyebrow"></p>
              <h2 id="battleHeading"></h2>
            </div>
          </div>
          <div id="narrativeBox" class="narrative-box"></div>
          <div class="action-grid">
            <button class="action-button" type="button"></button>
            <button class="action-button" type="button"></button>
            <button class="action-button" type="button"></button>
            <button class="action-button" type="button"></button>
          </div>
        </article>
        <article class="panel log-panel">
          <div class="section-heading">
            <div>
              <p id="logEyebrow" class="eyebrow"></p>
              <h2 id="logHeading"></h2>
            </div>
          </div>
          <div id="textShooterLog" class="log-list"></div>
        </article>
      </section>
    </main>
    <script src="./text-shooter.js"></script>
  </body>
</html>
